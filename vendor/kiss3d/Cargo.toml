[package]
edition = "2018"
name = "kiss3d"
version = "0.41.0"
authors = ["Sébastien Crozet <developer@crozet.re>"]
build = false
include = [
    "src/**/*.rs",
    "src/**/*.wgsl",
    "src/text/*.ttf",
    "examples/**/*.rs",
    "examples/media",
    "examples/Cargo.toml",
    "Cargo.toml",
    "LICENSE",
    "Readme.md",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Keep it simple, stupid, 2D and 3D graphics engine for Rust."
readme = "README.md"
keywords = [
    "graphics",
    "wgpu",
    "KISS",
]
license = "BSD-3-Clause"
repository = "https://github.com/dimforge/kiss3d"

[features]
