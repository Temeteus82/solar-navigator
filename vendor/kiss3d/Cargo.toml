[dependencies.bitflags]
version = "2"

[dependencies.bytemuck]
version = "1"
features = ["derive"]

[dependencies.egui]
version = "0.34"
optional = true
default-features = true

[dependencies.egui-wgpu]
version = "0.34"
optional = true

[dependencies.ffmpeg-the-third]
version = "4"
optional = true

[dependencies.glamx]
version = "0.2"
features = ["bytemuck"]

[dependencies.image]
version = "0.25"
features = ["default-formats"]
default-features = false

[dependencies.kiss3d-macro]
version = "0.36.0"

[dependencies.num-traits]
version = "0.2"

[dependencies.rgb]
version = "0.8"

[dependencies.rusttype]
version = "0.9"
features = ["gpu_cache"]

[dependencies.serde]
version = "1"
features = ["derive"]
