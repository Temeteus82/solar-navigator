name: Bug report
description: Report a reproducible problem in Solar Navigator
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.
  - type: input
    id: version
    attributes:
      label: Version
      description: App/repo version or commit SHA
      placeholder: v0.1.0 / 14f7fd4
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands, settings, and inputs
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Paste logs or drag in screenshots if available
